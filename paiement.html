<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - Asseko Store</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 15px; margin: 0; }
.card { max-width: 380px; margin: 20px auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #27ae60; }
.qr-box { background: white; padding: 8px; border-radius: 10px; margin: 10px 0; display: inline-block; }
.qr-box img { width: 100%; max-width: 180px; display: block; }
input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; background: #2a2a2a; color: white; outline: none; }
.btn { background: #27ae60; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
.price-tag { color: #27ae60; font-size: 1.5rem; font-weight: bold; margin: 5px 0; }
.liste-jeux { text-align: left; font-size: 0.9rem; background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 10px; color: #eee; min-height: 40px; }
ul { margin: 5px 0; padding-left: 20px; }
p { font-size: 0.85rem; margin: 5px 0; line-height: 1.2; color: #ccc; }
</style>
</head>
<body>

<div class="card">
<h2 style="margin: 0; font-size: 1.3rem;">Résumé de la commande</h2>

<div id="affichage-commande" class="liste-jeux">Chargement des détails...</div>

<div id="prix-total" class="price-tag">-- FCFA</div>

<div class="qr-box">
<p style="color: black; margin-bottom: 5px; font-weight: bold; font-size: 0.7rem;">SCANNEZ POUR PAYER</p>
<img src="image.png" alt="QR Code Airtel Money">
</div>

<p>Effectuez le dépôt au <b>077 82 64 58</b>.</p>

<input type="text" id="client_name" placeholder="Votre Nom complet">
<input type="email" id="client_email" placeholder="Votre Gmail">

<button onclick="envoyerCommande()" class="btn" id="btn-valider">J'AI PAYÉ (Recevoir mes jeux)</button>
</div>

<script>
emailjs.init("K3cFw1gtpb9bpjNyN");

// --- TA LISTE DE PRIX POUR L'ACHAT DIRECT ---
const prixCatalogue = {
"FIFA 22": 4000, "FIFA 21": 3500, "FIFA 20": 3000, "FIFA 17": 2000,
"Efootball 21": 3000, "Pro évolution soccer 2018": 2500, "Pro évolution soccer 17": 2000,
"GTA V": 4000, "Call of duty black ops 6": 7000, "Call of duty modern warfare 3": 5000,
"God of war": 7000, "God of war ragnarok": 8000, "Cyberpunk": 5500,
"Dragon Ball Z sparking zéro": 5000, "Dragon Ball z kakarot": 5000,
"Naruto storm 4": 4000, "Naruto x boruto connection storm": 5000,
"Naruto shinobi strike": 5500, "Jump force": 4000,
"Wwe 2k25": 8000, "NBA 2k23": 3500, "F1 2022": 4500
};

const params = new URLSearchParams(window.location.search);
const jeuDirect = params.get('jeu');
let jeuxTextePourEmail = "";
let montantTotal = 0;

function initialiserPage() {
const zoneAffichage = document.getElementById('affichage-commande');
const zonePrix = document.getElementById('prix-total');

if (jeuDirect) {
// OPTION A : ACHAT DIRECT (Bouton vert)
montantTotal = prixCatalogue[jeuDirect] || 0;
jeuxTextePourEmail = jeuDirect;
zoneAffichage.innerHTML = "<b>Jeu :</b> " + jeuDirect;
zonePrix.innerText = montantTotal + " F";
} else {
// OPTION B : PANIER (Bouton orange)
const panier = JSON.parse(localStorage.getItem('asseko_panier')) || [];

if (panier.length > 0) {
jeuxTextePourEmail = panier.map(j => j.nom).join(", ");
montantTotal = panier.reduce((sum, j) => sum + j.prix, 0);

let listeHtml = "<ul>";
panier.forEach(j => { listeHtml += `<li>${j.nom} (${j.prix} F)</li>`; });
listeHtml += "</ul>";

zoneAffichage.innerHTML = listeHtml;
zonePrix.innerText = montantTotal + " FCFA";
} else {
zoneAffichage.innerHTML = "Aucun jeu sélectionné.";
zonePrix.innerText = "0 F";
}
}
}

function envoyerCommande() {
const nom = document.getElementById('client_name').value;
const email = document.getElementById('client_email').value;

if (!nom || !email) {
alert("Veuillez remplir votre nom et votre adresse Gmail.");
return;
}

document.getElementById('btn-valider').innerText = "Envoi en cours...";

emailjs.send("service_nps1sar", "template_o3koshs", {
to_name: nom,
to_email: email,
game_name: jeuxTextePourEmail,
total_price: montantTotal + " F", // Nouveau champ utile
download_link: "Vérification du paiement en cours..."
}).then(() => {
alert("✅ Commande envoyée !");
// On vide le panier après le paiement
localStorage.removeItem('asseko_panier');
window.location.href = "https://wa.me/24177826458?text=" + encodeURIComponent("Salut Asseko Store, c'est " + nom + ". J'ai payé " + montantTotal + " F pour : " + jeuxTextePourEmail);
}, (error) => {
alert("Erreur lors de l'envoi. Contactez-moi sur WhatsApp.");
});
}

initialiserPage();
</script>
</body>
</html>
