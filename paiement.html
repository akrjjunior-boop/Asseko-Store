<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - Asseko Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="logo-container">
<img src="logo.png" alt="Logo" class="main-logo">
<h1>PAIEMENT</h1>
</div>
</header>

<div class="pay-card">
<label>Votre Nom :</label>
<input type="text" id="name" placeholder="Ex: Jean Asseko" oninput="checkForm()">

<label>Votre Gmail :</label>
<input type="email" id="email" placeholder="votre@gmail.com" oninput="checkForm()">

<p style="margin-top: 20px;">Dépôt Airtel Money au :</p>
<div class="airtel-box">+241 77 82 64 58</div>

<p>Ou scannez avec MyAirtel :</p>
<img src="mon-qr.png" alt="QR Code" class="qr-img">

<a id="wa-btn" href="#" class="btn-buy" style="background-color: #ccc; pointer-events: none;">J'AI PAYÉ</a>
<a href="index.html" style="display:block; margin-top:20px; color:#aaa; text-decoration:none;">← Annuler</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const jeu = params.get('jeu') || "Produit";

function checkForm() {
let n = document.getElementById('name').value;
let e = document.getElementById('email').value;
let b = document.getElementById('wa-btn');

if(n.length > 2 && e.includes('@')) {
b.style.backgroundColor = "#27ae60";
b.style.pointerEvents = "auto";
let txt = "Bonjour !\nJe suis : " + n + "\nEmail : " + e + "\nJeu payé : " + jeu + "\nEnvoyez-moi le lien !";
b.href = "https://wa.me/24177826458?text=" + encodeURIComponent(txt);
} else {
b.style.backgroundColor = "#ccc";
b.style.pointerEvents = "none";
}
}
</script>
</body>
</html>
