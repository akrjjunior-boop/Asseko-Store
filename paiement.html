<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement - Asseko Store</title>
<style>
body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
.card { max-width: 450px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 20px; border: 2px solid #27ae60; }
.qr-placeholder { background: white; padding: 15px; border-radius: 10px; width: 200px; margin: 20px auto; color: black; font-weight: bold; }
input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; }
.btn-valider { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
#recap { background: #252525; padding: 15px; border-radius: 10px; text-align: left; margin-bottom: 20px; border-left: 4px solid #f39c12; }
</style>
</head>
<body>

<div class="card">
<h2>Finaliser la commande</h2>
<div id="recap"></div>
<h3 id="montant-total" style="color:#27ae60; font-size: 1.8rem;">0 F</h3>

<div class="qr-placeholder">
[IMAGE QR CODE ICI]<br>
<small>Airtel Money</small>
</div>

<p>Faites le dépôt au : <b>077 82 64 58</b></p>

<input type="text" id="nom_client" placeholder="Votre Nom complet" required>
<input type="email" id="email_client" placeholder="Votre adresse Gmail" required>

<button onclick="envoyerCommande()" class="btn-valider" id="btn-submit">J'AI PAYÉ ✅</button>
</div>

<script>
const DISCORD_WEBHOOK = "https://discordapp.com/api/webhooks/1491165559281156286/56gJcFyKAXUeWI7gcDPB4ddYvD2Xw2CBR5ebudPQ4qOGKU1trBXelH_qAmrIVVIUkq63";

const prixCatalogue = {
"FIFA 22": 4000, "FIFA 21": 3500, "FIFA 20": 3000, "FIFA 17": 2000,
"Efootball 21": 3000, "PES 2018": 2500, "PES 17": 2000, "GTA V": 4000,
"CoD Black Ops 6": 7000, "CoD MW3": 5000, "God of War": 7000,
"GoW Ragnarok": 8000, "Cyberpunk 2077": 5500, "DBZ Sparking Zero": 5000,
"DBZ Kakarot": 5000, "Naruto Storm 4": 4000, "Naruto Connections": 5000,
"Naruto Shinobi Strike": 5500, "Jump Force": 4000, "WWE 2K25": 8000,
"NBA 2K23": 3500, "F1 2022": 4500, "Test Drive Unlimited 2": 3500,
"Naruto Storm Revolution": 3500, "Assassin's Creed Revelations": 3000,
"Minecraft Story Mode": 2500, "NFS Heat Deluxe": 4500
};

const params = new URLSearchParams(window.location.search);
const jeuDirect = params.get('jeu');
let listeJeuxMsg = "";
let totalA Payer = 0;

if (jeuDirect) {
totalAPayer = prixCatalogue[jeuDirect] || 0;
listeJeuxMsg = jeuDirect;
document.getElementById('recap').innerHTML = "<b>Jeu sélectionné :</b><br>" + jeuDirect;
} else {
const panier = JSON.parse(localStorage.getItem('asseko_panier')) || [];
totalAPayer = panier.reduce((sum, j) => sum + j.prix, 0);
listeJeuxMsg = panier.map(j => j.nom).join(", ");
document.getElementById('recap').innerHTML = "<b>Votre Panier :</b><br>" + (listeJeuxMsg || "Vide");
}
document.getElementById('montant-total').innerText = totalAPayer + " FCFA";

function envoyerCommande() {
const nom = document.getElementById('nom_client').value;
const email = document.getElementById('email_client').value;
const btn = document.getElementById('btn-submit');

if(!nom || !email) {
alert("Veuillez remplir votre nom et votre email !");
return;
}

btn.disabled = true;
btn.innerText = "Envoi en cours...";

// Préparation du message pour Discord
const discordMessage = {
username: "Asseko Store Bot",
embeds: [{
title: "🔔 Nouvelle Commande !",
color: 3066993,
fields: [
{ name: "👤 Client", value: nom, inline: true },
{ name: "📧 Email", value: email, inline: true },
{ name: "🎮 Jeux", value: listeJeuxMsg },
{ name: "💰 Total", value: totalAPayer + " FCFA", inline: true }
],
footer: { text: "Vérifie ton Airtel Money avant de livrer !" }
}]
};

fetch(DISCORD_WEBHOOK, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(discordMessage)
})
.then(() => {
alert("✅ Demande envoyée ! Asseko vérifie ton dépôt. Tu recevras tes liens par mail et WhatsApp.");
localStorage.removeItem('asseko_panier');
// Redirection WhatsApp
const waMsg = `Salut Asseko Store, je suis ${nom}. Je viens de payer ${totalAPayer}F pour ${listeJeuxMsg}. Mon mail : ${email}`;
window.location.href = "https://wa.me/24177826458?text=" + encodeURIComponent(waMsg);
})
.catch(() => {
alert("Erreur lors de l'envoi. Contactez Asseko sur WhatsApp.");
btn.disabled = false;
btn.innerText = "J'AI PAYÉ ✅";
});
}
</script>
</body>
</html>
