<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - Asseko Store</title>
<link rel="stylesheet" href="style.css">
<style>
.pay-section { display: flex; justify-content: center; padding: 20px; }
.pay-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }

.form-group { text-align: left; margin-bottom: 15px; }
label { font-weight: bold; font-size: 0.9rem; color: #555; }
input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
input:focus { border-color: #e74c3c; }

.airtel-box { font-size: 1.6rem; color: #e74c3c; font-weight: bold; margin: 15px 0; border: 2px solid #fce4e4; padding: 12px; border-radius: 12px; background: #fff5f5; }
.qr-img { width: 220px; margin: 10px 0; border-radius: 10px; border: 1px solid #eee; }

.btn-wa { background-color: #25D366; color: white; padding: 16px; text-decoration: none; border-radius: 10px; display: block; font-weight: bold; margin-top: 15px; transition: 0.3s; }
.btn-disabled { background-color: #ccc; pointer-events: none; opacity: 0.6; }

.instruction { font-size: 0.85rem; color: #e74c3c; font-weight: bold; margin-bottom: 15px; }
</style>
</head>
<body>

<header>
<h1>FINALISER MA COMMANDE</h1>
</header>

<div class="pay-section">
<div class="pay-card">
<p class="instruction">Étape 1 : Remplissez vos informations</p>

<div class="form-group">
<label>Nom complet :</label>
<input type="text" id="name" placeholder="Ex: Jean Asseko" oninput="checkForm()">
</div>

<div class="form-group">
<label>Adresse Gmail (pour recevoir le lien) :</label>
<input type="email" id="email" placeholder="Ex: monadresse@gmail.com" oninput="checkForm()">
</div>

<hr style="margin: 20px 0; border: 0.5px solid #eee;">

<p>Étape 2 : Payez par <strong>Airtel Money</strong></p>
<div class="airtel-box">+241 77 82 64 58</div>

<img src="mon-qr.png" alt="QR Code Airtel" class="qr-img">

<p style="font-size: 0.8rem; color: #666; margin-top: 10px;">
Une fois le dépôt fait, cliquez sur le bouton ci-dessous pour confirmer.
</p>

<a id="wa-btn" href="#" class="btn-wa btn-disabled">J'AI PAYÉ (Confirmer par WhatsApp)</a>

<a href="index.html" style="display:block; margin-top:20px; color:#999; text-decoration:none; font-size: 0.9rem;">← Retour à la boutique</a>
</div>
</div>

<script>
function checkForm() {
let name = document.getElementById('name').value;
let email = document.getElementById('email').value;
let btn = document.getElementById('wa-btn');

// On vérifie que le nom a plus de 2 lettres et que le mail contient un @
if(name.length > 2 && email.includes('@')) {
btn.classList.remove('btn-disabled');
let message = "Bonjour Asseko Store !\n\nJe suis : " + name + "\nMon Gmail : " + email + "\nJ'ai effectué le paiement Airtel Money. Merci de m'envoyer le lien du jeu !";
btn.href = "https://wa.me/24177826458?text=" + encodeURIComponent(message);
} else {
btn.classList.add('btn-disabled');
}
}
</script>

</body>
</html>
