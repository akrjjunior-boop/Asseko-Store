<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asseko Store - Meilleur Vendeur de Jeux PC</title>
<style>
:root { --primary: #27ae60; --bg: #121212; --card: #1e1e1e; }
body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding-bottom: 50px; }

/* Header Chic */
header { padding: 40px 20px; background: linear-gradient(180deg, #1a1a1a 0%, #121212 100%); border-bottom: 2px solid var(--primary); }
.logo-main { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; box-shadow: 0 0 15px rgba(39, 174, 96, 0.3); }
h1 { margin: 10px 0 5px; font-size: 1.8rem; letter-spacing: 1px; }
.slogan { color: #aaa; font-style: italic; font-size: 0.9rem; margin-bottom: 10px; }

/* Panier Flottant Mobile */
.cart-status { position: fixed; bottom: 20px; right: 20px; background: #f39c12; padding: 15px 25px; border-radius: 50px; font-weight: bold; text-decoration: none; color: white; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.6); border: 2px solid white; display: flex; align-items: center; gap: 8px; }

/* Grille Responsive (Mobile 2 colonnes / PC 4+) */
.grid-jeux { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; max-width: 1200px; margin: auto; }
@media (min-width: 768px) { .grid-jeux { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; } }

.jeu-card { background: var(--card); border-radius: 18px; overflow: hidden; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; }
.jeu-card img { width: 100%; height: 160px; object-fit: cover; }
.info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
.jeu-nom { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #eee; min-height: 34px; }
.prix { color: var(--primary); font-weight: 800; font-size: 1rem; margin-bottom: 12px; }

/* Boutons Compacts */
.btn-group { display: flex; gap: 6px; }
.btn-buy { background: var(--primary); color: white; text-decoration: none; padding: 10px; border-radius: 8px; flex: 3; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; text-align: center; }
.btn-cart { background: #444; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; font-size: 1rem; }

/* Footer */
footer { margin-top: 50px; padding: 30px; border-top: 1px solid #333; color: #666; font-size: 0.85rem; line-height: 1.6; }
footer b { color: var(--primary); }
</style>
</head>
<body>

<header>
<img src="logo.png" class="logo-main" alt="Logo">
<h1>ASSEKO<span style="color: var(--primary);">STORE</span></h1>
<p class="slogan">Meilleur vendeur de jeux PC</p>
</header>

<a href="panier.html" class="cart-status" id="cart-counter">🛒 <span>(0)</span></a>

<div class="grid-jeux" id="catalogue"></div>

<footer>
Asseko Store 2026 - Tous droits réservés<br>
Créateur : <b>Monsieur Asseko Régis</b>
</footer>

function render() {
const cat = document.getElementById('catalogue');
cat.innerHTML = listeJeux.map(j => `
<div class="jeu-card">
<img src="${j.img}" alt="${j.n}">
<div class="info">
<div class="jeu-nom">${j.n}</div>
<div class="prix">${j.p} F</div>
<div class="btn-group">
<a href="paiement.html?jeu=${encodeURIComponent(j.n)}" class="btn-buy">Acheter</a>
<button onclick="add('${j.n}', ${j.p})" class="btn-cart">🛒</button>
</div>
</div>
</div>
`).join('');
maj();
}

function add(n, p) {
let panier = JSON.parse(localStorage.getItem('asseko_panier')) || [];
panier.push({nom: n, prix: p});
localStorage.setItem('asseko_panier', JSON.stringify(panier));
maj();
alert("Ajouté !");
}

function maj() {
let p = JSON.parse(localStorage.getItem('asseko_panier')) || [];
document.querySelector('#cart-counter span').innerText = "(" + p.length + ")";
}

window.onload = render;
</script>
</body>
</html>
