<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Panier - Asseko Store</title>
<style>
body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
.panier-box { max-width: 450px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #27ae60; }
.item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; }
.btn-pay { background: #27ae60; color: white; display: block; padding: 15px; margin-top: 20px; text-decoration: none; border-radius: 10px; font-weight: bold; }
.btn-clear { background: #e74c3c; color: white; border: none; padding: 10px; margin-top: 10px; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>
<div class="panier-box">
<h1>🛒 Ton Panier</h1>
<div id="liste-panier"></div>
<h2 id="total-panier" style="color: #27ae60;">Total : 0 F</h2>
<a href="paiement.html" class="btn-pay">Passer au paiement</a>
<button onclick="viderPanier()" class="btn-clear">Vider le panier</button>
<br><br><a href="index.html" style="color: gray;">Retour au catalogue</a>
</div>

<script>
function chargerPanier() {
const panier = JSON.parse(localStorage.getItem('asseko_panier')) || [];
let total = 0;
const liste = document.getElementById('liste-panier');

if(panier.length === 0) {
liste.innerHTML = "<p>Ton panier est vide.</p>";
return;
}

liste.innerHTML = panier.map(j => {
total += j.prix;
return `<div class="item"><span>${j.nom}</span><span>${j.prix} F</span></div>`;
}).join('');
document.getElementById('total-panier').innerText = "Total : " + total + " F";
}

function viderPanier() {
localStorage.removeItem('asseko_panier');
location.reload();
}

window.onload = chargerPanier;
</script>
</body>
</html>
