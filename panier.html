<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Panier - Asseko Store</title>
<style>
body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
.container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #333; }
.btn-payer { display: block; background: #27ae60; color: white; padding: 15px; margin-top: 30px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; }
.btn-suppr { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
.total-box { margin-top: 20px; font-size: 1.5rem; color: #27ae60; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
<h1>🛒 Votre Panier</h1>
<div id="liste"></div>
<div class="total-box" id="total">Total : 0 F</div>
<a href="paiement.html" class="btn-payer">Procéder au paiement</a>
<br>
<a href="index.html" style="color: #aaa; text-decoration: none;">← Retour au catalogue</a>
</div>

<script>
function chargerPanier() {
const panier = JSON.parse(localStorage.getItem('asseko_panier')) || [];
const listeDiv = document.getElementById('liste');
let total = 0;

if (panier.length === 0) {
listeDiv.innerHTML = "<p>Votre panier est vide.</p>";
} else {
listeDiv.innerHTML = panier.map((j, i) => {
total += j.prix;
return `<div class="item">
<span><b>${j.nom}</b><br><small>${j.prix} F</small></span>
<button class="btn-suppr" onclick="supprimer(${i})">Supprimer</button>
</div>`;
}).join('');
}
document.getElementById('total').innerText = "Total : " + total + " FCFA";
}

function supprimer(i) {
let panier = JSON.parse(localStorage.getItem('asseko_panier'));
panier.splice(i, 1);
localStorage.setItem('asseko_panier', JSON.stringify(panier));
chargerPanier();
}

window.onload = chargerPanier;
</script>
</body>
</html>
